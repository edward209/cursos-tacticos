<!DOCTYPE html>
<html>
<head>
    <title>Editar Inscrito</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background:
                linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.92)),
                url("{{ url_for('static', filename='portada.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        .contenedor {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .box {
            width: 100%;
            max-width: 500px;
            background: rgba(0,0,0,0.82);
            border: 1px solid #00ff88;
            border-radius: 12px;
            padding: 35px;
            text-align: center;
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00ff88;
            background: white;
            margin-bottom: 20px;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 10px;
        }

        p {
            color: #d0d0d0;
            margin-bottom: 25px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #00ff88;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00cc6a;
        }

        .volver {
            margin-top: 18px;
        }

        .volver a {
            color: #00ff88;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="box">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" class="logo">
            <h1>Editar inscrito</h1>
            <p>Modifica la información del registro</p>

            <form method="POST">
                <input type="text" name="nombre" value="{{ registro.nombre }}" placeholder="Nombre completo" required>
                <input type="email" name="correo" value="{{ registro.correo }}" placeholder="Correo electrónico" required>

                <select name="curso" required>
                    <option value="Defensa Personal" {% if registro.curso == 'Defensa Personal' %}selected{% endif %}>Defensa Personal</option>
                    <option value="Supervivencia" {% if registro.curso == 'Supervivencia' %}selected{% endif %}>Supervivencia</option>
                    <option value="Tiro Táctico" {% if registro.curso == 'Tiro Táctico' %}selected{% endif %}>Tiro Táctico</option>
                </select>

                <button type="submit">Guardar cambios</button>
            </form>

            <div class="volver">
                <a href="/inscritos">← Volver al panel</a>
            </div>
        </div>
    </div>

</body>
</html>
