<!DOCTYPE html>
<html>
<head>
    <title>Editar inscrito | F.E.M.P.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background:
                linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.92)),
                url("{{ url_for('static', filename='portada.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        .contenedor {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .box {
            width: 100%;
            max-width: 620px;
            background: rgba(0,0,0,0.78);
            border: 1px solid rgba(0,255,136,0.35);
            border-radius: 18px;
            padding: 34px;
            text-align: center;
            box-shadow: 0 12px 28px rgba(0,0,0,0.25);
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            object-fit: cover;
            background: white;
            margin-bottom: 18px;
        }

        h1 {
            color: #00ff88;
            margin-top: 0;
            margin-bottom: 10px;
        }

        h3 {
            margin-top: 0;
            color: white;
            font-size: 20px;
        }

        p {
            color: #d0d0d0;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .fecha {
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 18px;
        }

        input, select {
            width: 100%;
            padding: 14px 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px 18px;
            background: #00ff88;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00cc6a;
        }

        .volver {
            margin-top: 18px;
        }

        .volver a {
            color: #00ff88;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="box">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" class="logo">

            <h1>Editar inscrito</h1>
            <h3>Fundación de Enfermeros Militares y Policía</h3>
            <p>Actualice los datos del participante registrado.</p>

            <div class="fecha">Fecha de inscripción: {{ registro.fecha }}</div>

            <form method="POST">
                <input type="text" name="nombre" value="{{ registro.nombre }}" required>
                <input type="email" name="correo" value="{{ registro.correo }}" required>

                <select id="area" required onchange="actualizarCursosEditar()">
                    <option value="">Selecciona un área</option>
                    <option value="medicina">⚕️ Área de Medicina Táctica</option>
                    <option value="auxilios">🚑 Primeros Auxilios</option>
                    <option value="mental">🧠 Salud Mental y Atención Psicosocial</option>
                    <option value="complementarios">🛡️ Cursos Complementarios</option>
                </select>

                <select id="curso" name="curso" required>
                    <option value="{{ registro.curso }}">{{ registro.curso }}</option>
                </select>

                <button type="submit">Guardar cambios</button>
            </form>

            <div class="volver">
                <a href="/inscritos">← Volver al panel</a>
            </div>
        </div>
    </div>

    <script>
        const cursosPorArea = {
            medicina: [
                "Medicina Táctica",
                "Manejo de Hemorragias",
                "Manejo de Fracturas",
                "Sutura",
                "Canalización de Paciente",
                "Curso de Manejo de Mina",
                "Concepto y Manejo del Paciente en Aeromedicina",
                "Manejo de Arma de Fuego",
                "Primer respondiente en disturbios públicos"
            ],
            auxilios: [
                "Primeros Auxilios Básicos",
                "Primeros Auxilios Psicológicos"
            ],
            mental: [
                "Prevención del Suicidio y Autolesión",
                "Intervención en Crisis y Desastres",
                "Atención Psicosocial a Víctimas de Violencia",
                "Prevención del Abuso Sexual Infantil",
                "Cuidado y Prevención del Maltrato Infantil",
                "Salud Mental para Cuidadores"
            ],
            complementarios: [
                "Básico de Inteligencia",
                "Inteligencia Avanzada",
                "Contrainteligencia",
                "Protección VP",
                "Método de la Investigación Criminalista",
                "Análisis Superior",
                "Derechos Humanos",
                "Detective Privado",
                "Reclutamiento de Fuentes",
                "Perfil Sospechoso"
            ]
        };

        function detectarAreaPorCurso(cursoActual) {
            for (const area in cursosPorArea) {
                if (cursosPorArea[area].includes(cursoActual)) {
                    return area;
                }
            }
            return "";
        }

        function actualizarCursosEditar() {
            const area = document.getElementById("area").value;
            const selectCurso = document.getElementById("curso");
            const cursoActual = "{{ registro.curso }}";

            selectCurso.innerHTML = "";

            if (!area) {
                const option = document.createElement("option");
                option.value = cursoActual;
                option.textContent = cursoActual;
                selectCurso.appendChild(option);
                return;
            }

            cursosPorArea[area].forEach(curso => {
                const option = document.createElement("option");
                option.value = curso;
                option.textContent = curso;
                if (curso === cursoActual) {
                    option.selected = true;
                }
                selectCurso.appendChild(option);
            });
        }

        window.onload = function() {
            const cursoActual = "{{ registro.curso }}";
            const areaDetectada = detectarAreaPorCurso(cursoActual);
            document.getElementById("area").value = areaDetectada;
            actualizarCursosEditar();
        };
    </script>

</body>
</html>
