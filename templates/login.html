<!DOCTYPE html>
<html>
<head>
    <title>Acceso al panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background:
                linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.92)),
                url("{{ url_for('static', filename='portada.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        .contenedor {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .box {
            width: 100%;
            max-width: 430px;
            background: rgba(0,0,0,0.78);
            border: 1px solid rgba(0,255,136,0.35);
            border-radius: 18px;
            padding: 34px;
            text-align: center;
            box-shadow: 0 12px 28px rgba(0,0,0,0.25);
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            object-fit: cover;
            background: white;
            margin-bottom: 18px;
        }

        h1 {
            color: #00ff88;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            color: #d0d0d0;
            line-height: 1.6;
            margin-bottom: 22px;
        }

        .error {
            color: #ff6666;
            font-weight: bold;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px 18px;
            background: #00ff88;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00cc6a;
        }

        .volver {
            margin-top: 18px;
        }

        .volver a {
            color: #00ff88;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="box">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" class="logo">
            <h1>Acceso al panel</h1>
            <p>Ingresa tus credenciales para administrar los inscritos.</p>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <input type="text" name="usuario" placeholder="Usuario" required>
                <input type="password" name="clave" placeholder="Contraseña" required>
                <button type="submit">Entrar</button>
            </form>

            <div class="volver">
                <a href="/">← Volver al inicio</a>
            </div>
        </div>
    </div>

</body>
</html>
