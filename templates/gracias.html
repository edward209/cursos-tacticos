<!DOCTYPE html>
<html>
<head>
    <title>Inscripción Exitosa</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ff88;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 150px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
            color: #cccccc;
        }

        a button {
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #00ff88;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
        }

        a button:hover {
            background-color: #00cc6a;
        }
    </style>
</head>
<body>

    <h1>✅ Inscripción completada</h1>
    <p>Gracias {{ nombre }} por registrarte.</p>
    <p>Pronto recibirás más información.</p>

    <a href="/">
        <button>Volver al inicio</button>
    </a>

</body>
</html>
