<!DOCTYPE html>
<html>
<head>
    <title>Inscripción completada</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background:
                linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.92)),
                url("{{ url_for('static', filename='portada.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        .contenedor {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .box {
            width: 100%;
            max-width: 560px;
            background: rgba(0,0,0,0.78);
            border: 1px solid rgba(0,255,136,0.35);
            border-radius: 18px;
            padding: 36px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.25);
            text-align: center;
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            object-fit: cover;
            background: white;
            margin-bottom: 18px;
        }

        h1 {
            color: #00ff88;
            margin-top: 0;
        }

        p {
            color: #d0d0d0;
            font-size: 18px;
            line-height: 1.7;
        }

        .btn {
            display: inline-block;
            margin-top: 18px;
            padding: 14px 22px;
            background: #00ff88;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00cc6a;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="box">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" class="logo">
            <h1>Inscripción completada</h1>
            <p>Gracias, <strong>{{ nombre }}</strong>. Hemos recibido tu solicitud correctamente.</p>
            <p>Pronto recibirás más información sobre el curso seleccionado.</p>

            <a href="/" class="btn">Volver al inicio</a>
        </div>
    </div>

</body>
</html>
