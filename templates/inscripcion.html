<!DOCTYPE html>
<html>
<head>
    <title>Inscripción | F.E.M.P.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background:
                linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.92)),
                url("{{ url_for('static', filename='portada.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        .topbar {
            background: rgba(0,0,0,0.92);
            border-bottom: 1px solid rgba(0,255,136,0.35);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-left img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid #00ff88;
            object-fit: cover;
            background: white;
        }

        .topbar-left h2 {
            margin: 0;
            color: #00ff88;
            font-size: 20px;
        }

        .topbar-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .topbar-links a {
            color: #00ff88;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 14px;
            border: 1px solid rgba(0,255,136,0.35);
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            transition: 0.3s;
        }

        .topbar-links a:hover {
            background: #00ff88;
            color: black;
        }

        .contenedor {
            min-height: calc(100vh - 86px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .form-box {
            width: 100%;
            max-width: 620px;
            background: rgba(0,0,0,0.78);
            border: 1px solid rgba(0,255,136,0.35);
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.25);
            text-align: center;
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            object-fit: cover;
            background: white;
            margin-bottom: 18px;
        }

        h1 {
            color: #00ff88;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            color: #d0d0d0;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .error {
            color: #ff6666;
            font-weight: bold;
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 14px 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px 18px;
            background: #00ff88;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00cc6a;
        }

        .info {
            margin-top: 20px;
            color: #d0d0d0;
            line-height: 1.8;
            text-align: left;
        }

        .info strong {
            color: #00ff88;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="topbar-left">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo">
            <h2>F.E.M.P.</h2>
        </div>

        <div class="topbar-links">
            <a href="/">Inicio</a>
            <a href="/cursos">Oferta académica</a>
            <a href="/inscripcion">Inscripción</a>
        </div>
    </div>

    <div class="contenedor">
        <div class="form-box">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" class="logo">
            <h1>📢 Inscripciones abiertas</h1>
            <p>Completa tus datos para reservar tu cupo en nuestros programas de capacitación.</p>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST" onsubmit="desactivarBotonEnvio()">
                <input type="text" name="nombre" placeholder="Nombre completo" required minlength="5" autocomplete="name">
                <input type="email" name="correo" placeholder="Correo electrónico" required autocomplete="email">

                <select id="area" name="area" required onchange="actualizarCursos()">
                    <option value="">Selecciona un área</option>
                    <option value="medicina">⚕️ Área de Medicina Táctica</option>
                    <option value="auxilios">🚑 Primeros Auxilios</option>
                    <option value="mental">🧠 Salud Mental y Atención Psicosocial</option>
                    <option value="complementarios">🛡️ Cursos Complementarios</option>
                </select>

                <select id="curso" name="curso" required>
                    <option value="">Selecciona primero un área</option>
                </select>

                <button id="btnEnviar" type="submit">Enviar inscripción</button>
            </form>

            <div class="info">
                <strong>WhatsApp:</strong> (849) 852-5975<br>
                <strong>Facebook:</strong> FEMP RD<br>
                <strong>Instagram:</strong> Fundación de Enfermeros Militares y Policías
            </div>
        </div>
    </div>

    <script>
        const cursosPorArea = {
            medicina: [
                "Medicina Táctica",
                "Manejo de Hemorragias",
                "Manejo de Fracturas",
                "Sutura",
                "Canalización de Paciente",
                "Curso de Manejo de Mina",
                "Concepto y Manejo del Paciente en Aeromedicina",
                "Manejo de Arma de Fuego",
                "Primer respondiente en disturbios públicos"
            ],
            auxilios: [
                "Primeros Auxilios Básicos",
                "Primeros Auxilios Psicológicos"
            ],
            mental: [
                "Prevención del Suicidio y Autolesión",
                "Intervención en Crisis y Desastres",
                "Atención Psicosocial a Víctimas de Violencia",
                "Prevención del Abuso Sexual Infantil",
                "Cuidado y Prevención del Maltrato Infantil",
                "Salud Mental para Cuidadores"
            ],
            complementarios: [
                "Básico de Inteligencia",
                "Inteligencia Avanzada",
                "Contrainteligencia",
                "Protección VP",
                "Método de la Investigación Criminalista",
                "Análisis Superior",
                "Derechos Humanos",
                "Detective Privado",
                "Reclutamiento de Fuentes",
                "Perfil Sospechoso"
            ]
        };

        function actualizarCursos() {
            const area = document.getElementById("area").value;
            const selectCurso = document.getElementById("curso");

            selectCurso.innerHTML = "";

            if (!area) {
                selectCurso.innerHTML = '<option value="">Selecciona primero un área</option>';
                return;
            }

            const opcionInicial = document.createElement("option");
            opcionInicial.value = "";
            opcionInicial.textContent = "Selecciona un curso";
            selectCurso.appendChild(opcionInicial);

            cursosPorArea[area].forEach(curso => {
                const option = document.createElement("option");
                option.value = curso;
                option.textContent = curso;
                selectCurso.appendChild(option);
            });
        }

        function desactivarBotonEnvio() {
            const boton = document.getElementById('btnEnviar');
            boton.disabled = true;
            boton.innerText = 'Enviando...';
        }
    </script>

</body>
</html>
